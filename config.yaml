# Per-agent model assignment. Change a line here, rerun, compare runs.
# Strong models where reasoning is hard (director, writer, chief editor),
# cheap fast models where the task is mechanical (copy editor, reader panel).

defaults:
  model: claude-sonnet-4-6
  max_tokens: 4096
  temperature: 0.7

agents:
  director:
    model: claude-sonnet-4-6
    temperature: 0.4        # specs should be precise, not creative
    max_tokens: 8192
  writer:
    model: claude-sonnet-4-6
    temperature: 0.8        # this is where creativity lives
    max_tokens: 8192
  continuity_editor:
    temperature: 0.2        # fact-checking wants determinism
  style_editor:
    temperature: 0.3
  reader_panel:
    model: claude-haiku-4-5-20251001
    temperature: 0.3
  chief_editor:
    temperature: 0.3
    max_tokens: 8192
  copy_editor:
    model: claude-haiku-4-5-20251001
    temperature: 0.2
  spark:
    temperature: 0.95        # sparks want heat

pipeline:
  max_revision_loops: 2
